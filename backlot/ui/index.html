<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cutlin Studio — 项目库</title>
<link rel="stylesheet" href="/ui/board.css">
</head>
<body>
<div class="wrap">
  <header class="slate">
    <div class="clapper"></div>
    <div>
      <span class="wordmark">Cutlin Studio</span>
      <h1>项目库</h1>
    </div>
    <span class="chip" id="count"></span>
    <div class="spacer"></div>
    <span class="live idle" id="liveBadge"><span class="dot"></span><span id="liveText">IDLE</span></span>
  </header>
  <div class="lib-grid" id="grid"></div>
  <p class="hint" id="empty" style="display:none">还没有项目 — 运行一次生产后会出现在这里。</p>
</div>
<script type="module" src="/ui/library.js"></script>
</body>
</html>
